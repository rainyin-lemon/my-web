		<script>
			// 数据渲染函数
			function change_main(data) {
				const update_time_now = document.querySelectorAll('.time_now');
				const [datePart, timePart] = data.update_time.split(' '); //时间分隔
				const [hours, minutes, seconds] = timePart.split(':');
				update_time_now[0].textContent = "实时天气 " + hours + ':' + minutes + "发布";
				
				const all_loc = document.querySelectorAll('.loc li a');
				all_loc[2].innerHTML = data.city;

				// 温度，湿度，风力
				const now = new Date();
				const main_weath = document.querySelectorAll('.weath_main a');
				
				main_weath[0].textContent = `${data.data[0].tem_night}°~${data.data[0].tem_day}°`;
				main_weath[1].innerHTML = "<br>" + data.data[0].wea;
				
				const more_weath = document.querySelectorAll('.weath_more span');
				
				more_weath[0].innerHTML = "风向&nbsp;&nbsp;" + data.data[0].win;
				more_weath[1].innerHTML = "风力&nbsp;&nbsp;" + data.data[0].win_speed;
				more_weath[2].innerHTML = "湿度&nbsp;&nbsp;" + "~";

			}

			function change_fore(data) {
				const timeElement = document.getElementById('update');
				const dayTbody = document.querySelector('.day tbody');
				const nightTbody = document.querySelector('.night tbody');
				timeElement.innerText = "更新时间：" + data.update_time;
				dayTbody.innerHTML = '';

				for (let i = 1; i < data.data.length; i++) {
					const info = data.data[i];

					// 白天表格行
					const dayTr = document.createElement('tr');
					dayTr.innerHTML = `
			    <td>${info.date}</td>
			    <td>${info.tem_night}℃ - ${info.tem_day}℃</td>
			    <td>${info.wea}</td>
			    <td>${info.win_speed}</td>
			    <td>${info.win}</td>
			  `;
					dayTbody.appendChild(dayTr);
				}

			}
		</script>
		<script>
			// 全屏代码
			function full_screen() {
				const iframe = document.getElementById("my-iframe");
				if (iframe.requestFullscreen) {
					iframe.requestFullscreen();
				} else if (iframe.mozRequestFullScreen) {
					iframe.mozRequestFullScreen();
				} else if (iframe.webkitRequestFullscreen) {
					iframe.webkitRequestFullscreen();
				} else if (iframe.msRequestFullscreen) {
					iframe.msRequestFullscreen();
				}
			}
			document.getElementById('full').onclick = full_screen;
		</script>
			
		<script>
			// 网络请求
			var weath_url = "http://v1.yiketianqi.com/free/week?appid=21498333&appsecret=Hev4Gx9T&unescape=1"
			var loc_code = 110000;
			var weather;
			var todayweather;

			// 定义JSONP回调函数
			function handleweather(data) {
				if (data) {
					console.log('成功获取天气');
					weather = data;
					console.log(weather);
					change_main(weather);
					change_fore(weather);
				} else {
					console.error('天气获取失败:', data.message);
				}
			}

			function getweather() {
				const callback = 'handleweather';
				const script = document.createElement('script');

				script.src =
					`http://v1.yiketianqi.com/free/week?appid=21498333&appsecret=Hev4Gx9T&unescape=1&callback=${callback}`
				document.head.appendChild(script);

				// 超时处理
				setTimeout(() => {
					if (!window[callback]) {
						console.error('未来天气请求超时');
						document.head.removeChild(script);
					}
				}, 5000);
			}


			// 获取数据并渲染
			getweather();
