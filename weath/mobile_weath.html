		<script>
			// 数据渲染函数
			function change_main(data) {
				const update_time_now = document.querySelectorAll('.time_now');
				split_array = data.realtime[0].update_time.split(/\s+/)  //时间分隔
				update_time_now[0].textContent = "实时天气 " + split_array.slice(-1) + "发布";
				
				const all_loc = document.querySelectorAll('.loc li a');
				// all_loc[1].textContent = data.realtime[0].province;
				all_loc[2].textContent = data.realtime[0].city;
				all_loc[3].textContent = data.realtime[0].district;

				const main_weath = document.querySelectorAll('.weath_main a');
				main_weath[0].textContent = data.realtime[0].infos.temperature + "°";
				main_weath[1].innerHTML = "<br>" + data.realtime[0].infos.weather;

				const more_weath = document.querySelectorAll('.weath_more span');
				more_weath[0].innerHTML = "湿度&nbsp;" + data.realtime[0].infos.humidity + "%";

				more_weath[1].innerHTML = "风向&nbsp;" + data.realtime[0].infos.wind_direction;
				more_weath[2].innerHTML = "风力&nbsp;" + data.realtime[0].infos.wind_power;
			}

			function change_fore(data) {
				const timeElement = document.getElementById('update');
				const dayTbody = document.querySelector('.day tbody');
				const nightTbody = document.querySelector('.night tbody');
				timeElement.innerText = "更新时间：" + data.forecast[0].update_time;
				dayTbody.innerHTML = '';
				nightTbody.innerHTML = '';
				for (let i = 0; i < data.forecast[0].infos.length; i++) {
					const info = data.forecast[0].infos[i];

					// 白天表格行
					const dayTr = document.createElement('tr');
					dayTr.innerHTML = `
			    <td>${info.date}</td>
			    <td>${info.day.humidity}%</td>
			    <td>${info.day.temperature}℃</td>
			    <td>${info.day.weather}</td>
			    <td>${info.day.wind_power}</td>
			    <td>${info.day.wind_direction}</td>
			  `;
					dayTbody.appendChild(dayTr);

					// 夜晚表格行
					const nightTr = document.createElement('tr');
					nightTr.innerHTML = `
			    <td>${info.date}</td>
			    <td>${info.night.humidity}%</td>
			    <td>${info.night.temperature}℃</td>
			    <td>${info.night.weather}</td>
			    <td>${info.night.wind_power}</td>
			    <td>${info.night.wind_direction}</td>
			  `;
					nightTbody.appendChild(nightTr);
				}

			}

		<script>
			// 网络请求
			var local_url = "https://apis.map.qq.com/ws/location/v1/ip?key=LLNBZ-I26CH-C2FDU-WCZE2-67AC6-LUBKC"
			var weath_url = "https://apis.map.qq.com/ws/location/v1/ip?key=LLNBZ-I26CH-C2FDU-WCZE2-67AC6-LUBKC"
			var loc_code = 110000;
			var weather;
			var todayweather;

			// 定义JSONP回调函数
			function handleLocation(data) {
				if (data.status === 0) {
					console.log('定位成功:');
					var loc_data = data.result;
					loc_code = loc_data.ad_info.adcode;
					console.log(loc_code)
					setTimeout("getweather()", 1200);  // 延时减少并发
					gettodayweather()
				} else {
					console.error('定位失败:', data.message);
				}
			}

			function handleweather(data) {
				if (data.status === 0) {
					console.log('成功获取未来天气');
					weather = data.result;
					console.log(weather);
					change_fore(weather);
				} else {
					console.error('未来天气获取失败:', data.message);
				}
			}

			function handletodayweather(data) {
				if (data.status === 0) {
					console.log('成功获取实时天气');
					todayweather = data.result;
					console.log(todayweather)
					change_main(todayweather);
				} else {
					console.error('实时天气获取失败:', data.message);
				}
			}
			// 动态创建script标签发起请求
			function getLocation() {
				const key = 'LLNBZ-I26CH-C2FDU-WCZE2-67AC6-LUBKC';
				const callback = 'handleLocation';
				const script = document.createElement('script');

				script.src = `https://apis.map.qq.com/ws/location/v1/ip?key=${key}&output=jsonp&callback=${callback}`;
				document.head.appendChild(script);

				// 超时处理
				setTimeout(() => {
					if (!window[callback]) {
						console.error('位置请求超时');
						document.head.removeChild(script);
					}
				}, 5000);
			}

			function getweather() {
				const key = 'LLNBZ-I26CH-C2FDU-WCZE2-67AC6-LUBKC';
				const callback = 'handleweather';
				const script = document.createElement('script');

				script.src =
					`https://apis.map.qq.com/ws/weather/v1/?key=${key}&adcode=${loc_code}&type=future&output=jsonp&callback=${callback}`;
				document.head.appendChild(script);

				// 超时处理
				setTimeout(() => {
					if (!window[callback]) {
						console.error('未来天气请求超时');
						document.head.removeChild(script);
					}
				}, 5000);
			}

			function gettodayweather() {
				const key = 'LLNBZ-I26CH-C2FDU-WCZE2-67AC6-LUBKC';
				const callback = 'handletodayweather';
				const script = document.createElement('script');

				script.src =
					`https://apis.map.qq.com/ws/weather/v1/?key=${key}&adcode=${loc_code}&type=now&output=jsonp&callback=${callback}`;
				document.head.appendChild(script);

				// 超时处理
				setTimeout(() => {
					if (!window[callback]) {
						console.error('实时天气请求超时');
						document.head.removeChild(script);
					}
				}, 5000);
			}
			// 获取数据并渲染
			getLocation();
		</script>
