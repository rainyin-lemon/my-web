		<script>
			var show = false;
			layui.use(['layer', 'util'], function() {
				var layer = layui.layer;
				var util = layui.util;

				// 头部事件
				util.event('lay-header-event', {
					menuRight: function(othis) {
						// 左侧菜单事件
						if (show) {
							document.body.style.overflow = "";
							$("#myOverlay").toggle();
							$("#myMenu").animate({
								left: -300
							});
							show = false;
						} else {
							document.body.style.overflow = "hidden";
							$("#myMenu").animate({
								left: 0
							});
							$("#myOverlay").toggle();
							show = true;
						}
					},
					shade_event: function() {
						document.body.style.overflow = "";
						$("#myOverlay").toggle();
						$("#myMenu").animate({
							left: -300
						});
						show = false;
					}
				});
			});
		</script>
		<script>
			// 切换句子
			var characterArray = ['三秋桂子，十里荷花。', '行路难，不在山，不在水，只在人情反覆间。', '我曾见月色轻挽风尘，亦听闻星河孤舟失沉。', '青山落日，秋月春风。',
				'惟江上之清风，与山间之明月。耳得之而为声，目遇之而成色。', '人生如梦，一尊还酹江月。', '永不言败，是成功者的最佳品格。 ', '心随朗月高，志与秋霜洁。',
				'往事不必再提，人生已多风雨，我只愿风止于秋水，而我止于你。', '秋天，野草被风吹得渐渐变黄，草地变成了金色的海洋。', '我一直喜欢下午的阳光，它让我相信这个世界任何事情都会有转机。',
				'一个人的时候，或许会烦躁，别忘了控制自己的情绪，别为自己的情绪伤害了重要的人！',
				'真正的平静，不是避开车马喧嚣，而是在心中修篱种菊。尽管如流往事，每一天都涛声依旧，只要我们消除执念，便可寂静安然。愿每个人，在纷呈世相中不会迷失荒径，可以端坐磐石上，醉倒落花前。',
			];
			var randomText = $('#randomText');
			randomText.on('click', function() {
				// 随机生成数组索引
				var index = Math.floor(Math.random() * characterArray.length);

				// 获取随机字符
				var randomCharacter = characterArray[index];

				// 更新元素的文本内容
				randomText.text(randomCharacter);
			});
		</script>
		<script>
			(function($) {
				$.fn.snow = function(options) {
					var $flake = $('<div id="snowbox" />').css({
							'position': 'fixed',
							'z-index': '1000',
							'top': '-50px',
							'cursor': 'pointer',
							'border-radius': '50%'
						}).html('🌸​'),
						documentHeight = $(document).height(),
						documentWidth = $(document).width(),
						defaults = {
							minSize: 10,
							maxSize: 20,
							newOn: 1000,
							flakeColor: "white" /* 此处可以定义雪花颜色，若要白色可以改为#FFFFFF */
						},
						options = $.extend({}, defaults, options);
					// 视口高度,用于计算持续时间
					const viewportHeight = window.innerHeight;
					console.log(viewportHeight);
					var interval = setInterval(function() {
						var startPositionLeft = Math.random() * documentWidth - 50,
							startOpacity = 0.85 + Math.random(),
							sizeFlake = options.minSize + Math.random() * options.maxSize,
							endPositionTop = window.innerHeight + 50,
							endPositionLeft = Math.random() * documentWidth - 50,
							durationFall = viewportHeight * 5 + Math.random() * 5000;
						$flake.clone().appendTo('body').css({
							left: startPositionLeft,
							opacity: startOpacity,
							'font-size': sizeFlake,
							color: options.flakeColor
						}).animate({
							top: endPositionTop,
							left: endPositionLeft,
							opacity: 0.75
						}, durationFall, 'linear', function() {
							$(this).remove()
						});
					}, options.newOn);
				};
			})(jQuery);
			$(function() {
				// 设置电脑设备运行雪花
				const isSmallScreen = window.matchMedia("(max-width: 1000px)").matches;
				if (!isSmallScreen) {
					$.fn.snow({
						minSize: 12,
						/* 定义雪花最小尺寸 */
						maxSize: 15,
						/* 定义雪花最大尺寸 */
						newOn: 5000 /* 定义密集程度，数字越小越密集 */
					});
				}

			});
		</script>
